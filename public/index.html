<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PokeMath</title>

        <link rel="stylesheet" href="/css/base.css" />
        <link rel="stylesheet" href="/css/components.css" />
        <link rel="stylesheet" href="/css/index.css" />
        <link rel="stylesheet" href="/vendor/katex/katex.css" />

        <style>
            body {
                visibility: hidden;
            }
        </style>
        <script defer>
            // Loader
            document.addEventListener('DOMContentLoaded', async () => {
                const res = await fetch('/api/active-question');
                const html = await res.text();

                document.getElementById('question').innerHTML = html;
                document.body.style.visibility = 'visible';
            });

            document.addEventListener('fx:before', (evt) => {
                const form = evt.target.closest('form') ?? evt.target;

                form.querySelectorAll('input, button, select, textarea').forEach((el) => (el.disabled = true));
            });

            document.addEventListener('fx:after', (evt) => {
                const form = evt.target.closest('form') ?? evt.target;

                form.querySelectorAll('input, button, select, textarea').forEach((el) => (el.disabled = false));

                document.getElementById('answer').value = '';
            });
        </script>

        <script defer src="/vendor/the-fixi-project/fixi-0.9.4.js"></script>
    </head>
    <body>
        <nav>
            <a href="/">PokeMath</a>
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-user-icon lucide-user"
            >
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
        </nav>

        <main>
            <form fx-action="/api/active-question" fx-method="post" fx-target="#question" fx-swap="innerHTML">
                <div id="question"></div>

                <input id="answer" name="answer" type="number" placeholder="Enter your answer" required autocomplete="off" autofocus />

                <button type="submit">Submit</button>
            </form>
        </main>

        <footer>
            <a href="https://github.com/marvinalegre/pokemath" target="_blank" rel="noopener noreferrer">Source Code</a>
        </footer>
    </body>
</html>
