<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PokeMath</title>

        <link rel="stylesheet" href="/css/base.css" />
        <link rel="stylesheet" href="/css/components.css" />
        <link rel="stylesheet" href="/css/index.css" />

        <link rel="stylesheet" href="/vendor/katex/katex.css" />
        <script defer src="/vendor/katex/katex.js"></script>
        <script defer src="/vendor/katex/auto-render.js"></script>

        <style>
            body {
                visibility: hidden;
            }
        </style>
        <script defer>
            document.addEventListener('DOMContentLoaded', () => {
                renderMathInElement(document.body);
                document.body.style.visibility = 'visible';
            });
        </script>
    </head>
    <body>
        <nav>
            <a href="/">PokeMath</a>
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-user-icon lucide-user"
            >
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
        </nav>

        <main>
            <form>
                <div id="question">\(1 + 1 = \; ?\)</div>

                <input id="answer" name="answer" type="number" placeholder="Enter your answer" required autocomplete="off" autofocus />

                <button type="submit">Submit</button>
            </form>
        </main>
    </body>
</html>
